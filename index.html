<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>My Home Page</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body { margin: 0; font-family: Arial, sans-serif; }
    .navbar { background: #333; color: white; padding: 15px; display: flex; justify-content: space-between; }
    .navbar a { color: white; text-decoration: none; margin-left: 15px; }
    .hero { background: #4CAF50; color: white; padding: 80px 20px; text-align: center; }
    .features { display: flex; justify-content: space-around; padding: 40px; flex-wrap: wrap; }
    .feature { width: 250px; text-align: center; margin: 10px; }
    .footer { background: #222; color: white; text-align: center; padding: 20px; }
  </style>
</head>
<body>
  <div class="navbar">
    <div><strong>MySite</strong></div>
    <div>
      <a href="#">Home</a>
      <a href="#">About</a>
      <a href="#">Contact</a>
    </div>
  </div>
  <div class="hero">
    <h1>Welcome to My Website</h1>
    <p>This is a simple homepage you can customize</p>
    <button>Get Started</button>
  </div>
  <div class="features">
    <div class="feature"><h3>Fast</h3><p>Optimized for speed</p></div>
    <div class="feature"><h3>Responsive</h3><p>Works on all devices</p></div>
    <div class="feature"><h3>Easy</h3><p>Beginner friendly</p></div>
  </div>
  <div class="footer">
    <p>© 2026 MySite</p>
  </div>
</body>
</html>
